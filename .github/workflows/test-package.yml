name: Test package

permissions:
  contents: read

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:

  prepare:

    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Create matrix
        uses: fabiocaccamo/create-matrix-action@842c9dabf1cec0ba7417f30ec26ce2290b951ef0 # v7
        id: create_matrix
        with:
          matrix: |
            python-version {3.10}, django-version {4.2, 5.0, 5.1, 5.2}
            python-version {3.11}, django-version {4.2, 5.0, 5.1, 5.2}
            python-version {3.12}, django-version {4.2, 5.0, 5.1, 5.2, 6.0}
            python-version {3.13}, django-version {5.1, 5.2, 6.0}
            python-version {3.14}, django-version {5.2, 6.0}

    outputs:
      matrix: ${{ steps.create_matrix.outputs.matrix }}

  # lint:

  #   runs-on: ubuntu-latest
  #   steps:
  #   - name: Checkout code
  #     uses: actions/checkout@v6

  #   - name: Set up Python
  #     uses: actions/setup-python@v6
  #     with:
  #       python-version: '3.x'
  #       cache: 'pip'

  #   - name: Install tools needed
  #     run: |
  #       sudo apt install gettext
  #       python -m pip install --upgrade pip
  #       pip install tox

  #   - name: Check migrations
  #     run: |
  #       tox -e migrations

  #   - name: Check translations
  #     run: |
  #       tox -e translations

  test:

    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{fromJson(needs.prepare.outputs.matrix)}}

    steps:

    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Upgrade pip version
      run: |
        python -m pip install --upgrade pip

    - name: Install django
      run: |
        pip install "Django == ${{ matrix.django-version }}.*"

    - name: Install requirements
      run: |
        pip install -r requirements.txt
        pip install -r requirements-test.txt

    - name: Run pre-commit
      run: |
        pre-commit run --all-files --show-diff-on-failure --verbose

    - name: Run tests
      run: |
        coverage run --append --source=maintenance_mode runtests.py
        coverage report --show-missing
        coverage xml -o ./coverage.xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false
        files: ./coverage.xml
        flags: unittests
        verbose: true
